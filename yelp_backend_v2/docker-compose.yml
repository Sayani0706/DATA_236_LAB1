services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: yelp_zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "12181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: yelp_kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "19092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  mongodb:
    image: mongo:7.0
    container_name: yelp_mongodb
    restart: always
    ports:
      - "37017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Gateway ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: yelp_gateway
    restart: always
    ports:
      - "18000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user_service
      - restaurant_service
      - review_service
      - owner_service

  # ── API Services ─────────────────────────────────────────────
  user_service:
    build: ./user_service
    container_name: yelp_user_service
    restart: always
    ports:
      - "18101:8001"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB_NAME: yelp_db
      SECRET_KEY: ${SECRET_KEY:-secret}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started

  restaurant_service:
    build: ./restaurant_service
    container_name: yelp_restaurant_service
    restart: always
    ports:
      - "18102:8002"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB_NAME: yelp_db
      SECRET_KEY: ${SECRET_KEY:-secret}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started

  review_service:
    build: ./review_service
    container_name: yelp_review_service
    restart: always
    ports:
      - "18103:8003"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB_NAME: yelp_db
      SECRET_KEY: ${SECRET_KEY:-secret}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started

  owner_service:
    build: ./owner_service
    container_name: yelp_owner_service
    restart: always
    ports:
      - "18104:8004"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB_NAME: yelp_db
      SECRET_KEY: ${SECRET_KEY:-secret}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started

  # ── Worker Services ──────────────────────────────────────────
  review_worker_service:
    build: ./review_worker_service
    container_name: yelp_review_worker_service
    restart: always
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB_NAME: yelp_db
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started

  restaurant_worker_service:
    build: ./restaurant_worker_service
    container_name: yelp_restaurant_worker_service
    restart: always
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB_NAME: yelp_db
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started

  user_worker_service:
    build: ./user_worker_service
    container_name: yelp_user_worker_service
    restart: always
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB_NAME: yelp_db
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started

volumes:
  mongo_data:
  uploads_data:
